<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SciTools 引用助手</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; color: #333; padding: 12px; background: #fafafa; }
    h2 { font-size: 15px; margin-bottom: 10px; color: #222; }
    .section { margin-bottom: 14px; }
    .section label { font-weight: 600; font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    select, input { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; background: #fff; }
    select:focus, input:focus { outline: none; border-color: #667eea; }
    .btn { width: 100%; padding: 9px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 6px; }
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover { background: #5a6fd6; }
    .btn-secondary { background: #e8e8e8; color: #333; }
    .btn-secondary:hover { background: #ddd; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .ref-list { max-height: 260px; overflow-y: auto; margin: 8px 0; }
    .ref-item { padding: 8px 10px; margin-bottom: 4px; background: #fff; border: 1px solid #eee; border-radius: 6px; cursor: pointer; }
    .ref-item:hover { border-color: #667eea; background: #f0f2ff; }
    .ref-item.selected { border-color: #667eea; background: #e8ecff; }
    .ref-title { font-weight: 600; font-size: 12px; margin-bottom: 2px; }
    .ref-meta { font-size: 11px; color: #888; }
    .status { padding: 8px; margin: 8px 0; border-radius: 6px; font-size: 12px; }
    .status.ok { background: #d4edda; color: #155724; }
    .status.err { background: #f8d7da; color: #721c24; }
    .status.info { background: #e2e3f1; color: #383d6e; }
    .check-wrap { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
    .check-wrap input[type=checkbox] { width: auto; }
    hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }
  </style>
</head>
<body>
  <h2>SciTools 引用助手</h2>

  <div class="section">
    <label>引用样式</label>
    <select id="styleSelect"></select>
  </div>

  <div class="section">
    <label>搜索题录</label>
    <input id="searchInput" type="text" placeholder="输入关键词搜索..." />
  </div>

  <div id="refList" class="ref-list"></div>

  <button id="btnInsertInline" class="btn btn-primary" disabled>插入文内引用</button>
  <button id="btnInsertBib" class="btn btn-secondary" disabled>生成参考文献列表</button>

  <hr />
  <div class="section">
    <div class="check-wrap">
      <input type="checkbox" id="autoPolling" checked />
      <label for="autoPolling" style="font-weight:400;margin:0">自动接收主程序推送</label>
    </div>
  </div>

  <div id="statusMsg"></div>

  <script>
    const API_BASE = 'https://localhost:3443/api/literature';
    let selectedRefs = [];
    let allRefs = [];
    let pollingTimer = null;

    Office.onReady(function (info) {
      if (info.host === Office.HostType.Word) {
        init();
      }
    });

    async function init() {
      await loadStyles();
      await loadRefs();
      document.getElementById('searchInput').addEventListener('input', debounce(onSearch, 300));
      document.getElementById('btnInsertInline').addEventListener('click', insertInline);
      document.getElementById('btnInsertBib').addEventListener('click', insertBibliography);
      document.getElementById('autoPolling').addEventListener('change', togglePolling);
      startPolling();
      showStatus('已连接到 SciTools', 'ok');
    }

    async function apiGet(path) {
      const res = await fetch(API_BASE + path);
      if (!res.ok) throw new Error('请求失败');
      return res.json();
    }

    async function apiPost(path, data) {
      const res = await fetch(API_BASE + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error('请求失败');
      return res.json();
    }

    async function loadStyles() {
      try {
        const styles = await apiGet('/addin/styles');
        const sel = document.getElementById('styleSelect');
        sel.innerHTML = styles.map(s => `<option value="${s.id}">${s.name}${s.is_preset ? ' (预设)' : ''}</option>`).join('');
      } catch (e) {
        showStatus('加载样式失败，请确保 SciTools 正在运行', 'err');
      }
    }

    async function loadRefs(query) {
      try {
        const url = query ? '/addin/refs?q=' + encodeURIComponent(query) : '/addin/refs';
        allRefs = await apiGet(url);
        renderRefs(allRefs);
      } catch (e) {
        showStatus('加载题录失败', 'err');
      }
    }

    function renderRefs(refs) {
      const list = document.getElementById('refList');
      if (refs.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:20px;color:#999;font-size:12px">暂无题录</div>';
        return;
      }
      list.innerHTML = refs.map(r => {
        const authors = parseAuthors(r.authors);
        const sel = selectedRefs.includes(r.id) ? ' selected' : '';
        return `<div class="ref-item${sel}" data-id="${r.id}" onclick="toggleRef(${r.id})">
          <div class="ref-title">${r.title || '无标题'}</div>
          <div class="ref-meta">${authors} · ${r.year || '?'} · ${r.journal || ''}</div>
        </div>`;
      }).join('');
      updateButtons();
    }

    function parseAuthors(raw) {
      try {
        const arr = typeof raw === 'string' ? JSON.parse(raw) : (raw || []);
        if (arr.length <= 2) return arr.join(', ');
        return arr[0] + ' 等';
      } catch { return raw || ''; }
    }

    function toggleRef(id) {
      const idx = selectedRefs.indexOf(id);
      if (idx >= 0) selectedRefs.splice(idx, 1);
      else selectedRefs.push(id);
      renderRefs(allRefs);
    }

    function updateButtons() {
      const hasSelection = selectedRefs.length > 0;
      document.getElementById('btnInsertInline').disabled = !hasSelection;
      document.getElementById('btnInsertBib').disabled = !hasSelection;
    }

    function onSearch() {
      const q = document.getElementById('searchInput').value.trim();
      loadRefs(q || undefined);
    }

    async function insertInline() {
      if (selectedRefs.length === 0) return;
      const styleId = document.getElementById('styleSelect').value;
      try {
        const data = await apiPost('/cite/format', { ref_ids: selectedRefs, style_id: parseInt(styleId) });
        await Word.run(async (context) => {
          const range = context.document.getSelection();
          range.insertText(data.inline, Word.InsertLocation.replace);
          await context.sync();
        });
        showStatus('文内引用已插入', 'ok');
      } catch (e) {
        showStatus('插入失败: ' + e.message, 'err');
      }
    }

    async function insertBibliography() {
      if (selectedRefs.length === 0) return;
      const styleId = document.getElementById('styleSelect').value;
      try {
        const data = await apiPost('/cite/format', { ref_ids: selectedRefs, style_id: parseInt(styleId) });
        await Word.run(async (context) => {
          const body = context.document.body;
          body.insertParagraph('', Word.InsertLocation.end);
          body.insertParagraph('参考文献', Word.InsertLocation.end).font.bold = true;
          const lines = data.bibliography.split('\n');
          for (const line of lines) {
            if (line.trim()) body.insertParagraph(line, Word.InsertLocation.end);
          }
          await context.sync();
        });
        showStatus('参考文献列表已插入', 'ok');
      } catch (e) {
        showStatus('插入失败: ' + e.message, 'err');
      }
    }

    // 轮询主程序推送
    function startPolling() {
      if (pollingTimer) return;
      pollingTimer = setInterval(async () => {
        if (!document.getElementById('autoPolling').checked) return;
        try {
          const data = await apiGet('/addin/poll');
          if (!data.action) return;
          if (data.action === 'inline') {
            await Word.run(async (context) => {
              const range = context.document.getSelection();
              range.insertText(data.inline, Word.InsertLocation.replace);
              await context.sync();
            });
            showStatus('主程序推送：文内引用已插入', 'info');
          } else if (data.action === 'bibliography') {
            await Word.run(async (context) => {
              const body = context.document.body;
              body.insertParagraph('', Word.InsertLocation.end);
              body.insertParagraph('参考文献', Word.InsertLocation.end).font.bold = true;
              const lines = data.bibliography.split('\n');
              for (const line of lines) {
                if (line.trim()) body.insertParagraph(line, Word.InsertLocation.end);
              }
              await context.sync();
            });
            showStatus('主程序推送：参考文献已插入', 'info');
          }
        } catch {}
      }, 2000);
    }

    function togglePolling() {
      if (document.getElementById('autoPolling').checked) {
        startPolling();
      } else {
        clearInterval(pollingTimer);
        pollingTimer = null;
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById('statusMsg');
      el.className = 'status ' + (type || 'info');
      el.textContent = msg;
      if (type === 'ok' || type === 'info') setTimeout(() => { el.textContent = ''; el.className = ''; }, 3000);
    }

    function debounce(fn, ms) {
      let t; return function () { clearTimeout(t); t = setTimeout(fn, ms); };
    }
  </script>
</body>
</html>
